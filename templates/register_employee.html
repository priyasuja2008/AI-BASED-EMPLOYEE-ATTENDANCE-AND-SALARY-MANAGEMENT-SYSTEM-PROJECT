<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Employee Registration</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/register_employee.css') }}">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<div class="container">

    <div class="header">

        <h1><i class="fas fa-user-plus"></i> Employee Registration</h1>

        <a href="/dashboard" class="back-btn">
            <i class="fas fa-arrow-left"></i> Dashboard
        </a>

    </div>

    <form action="/register_employee" method="POST" enctype="multipart/form-data">

        <!-- Personal Information -->

        <div class="card">

            <h2><i class="fas fa-user"></i> Personal Information</h2>

            <div class="grid">

                <div class="input-box">

                    <label>Employee ID</label>

                    <input type="text"
                           id="employee_code"
                           name="employee_code"
                           value="{{ employee_code }}"
                           readonly>

                </div>

                <div class="input-box">

                    <label>Full Name</label>

                    <input type="text"
                           name="name"
                           placeholder="Enter Full Name"
                           required>

                </div>

                <div class="input-box">

                    <label>Gender</label>

                    <select name="gender">

                        <option>Male</option>
                        <option>Female</option>
                        <option>Other</option>

                    </select>

                </div>

                <div class="input-box">

                    <label>Date of Birth</label>

                    <input type="date"
                           name="dob">

                </div>

                <div class="input-box">

                    <label>Email</label>

                    <input type="email"
                           name="email">

                </div>

                <div class="input-box">

                    <label>Phone Number</label>

                    <input type="text"
                           name="phone">

                </div>

                <div class="input-box full">

                    <label>Address</label>

                    <textarea name="address"
                              rows="3"></textarea>

                </div>

            </div>

        </div>

        <!-- Employment -->

        <div class="card">

            <h2><i class="fas fa-briefcase"></i> Employment Details</h2>

            <div class="grid">

                <div class="input-box">

                    <label>Department</label>

                    <select name="department_id">

                        <option value="">Select Department</option>

                        <option value="1">HR</option>
                        <option value="2">IT</option>
                        <option value="3">Finance</option>
                        <option value="4">Sales</option>
                        <option value="5">Marketing</option>
                        <option value="6">Production</option>

                    </select>

                </div>

                <div class="input-box">

                    <label>Designation</label>

                    <input type="text"
                           name="designation">

                </div>

                <div class="input-box">

                    <label>Date of Joining</label>

                    <input type="date"
                           name="join_date">

                </div>

                <div class="input-box">

                    <label>Shift</label>

                    <select name="shift">

                        <option>Morning</option>
                        <option>Evening</option>
                        <option>Night</option>
                        <option>General</option>

                    </select>

                </div>

                <div class="input-box">

                    <label>Check-in Time</label>

                    <input type="time"
                           name="check_in" required>

                </div>

                <div class="input-box">

                    <label>Check-out Time</label>

                    <input type="time"
                           name="check_out" required>

                </div>
                <div class="input-box">

                    <label>basic Salary (per month)</label>

                    <input type="number"
                           name="basic_salary">

                </div>

                <div class="input-box">

                    <label>Status</label>

                    <select name="status">

                        <option>Active</option>
                        <option>Inactive</option>

                    </select>

                </div>

            </div>

        </div>

        <!-- Buttons -->

        <div class="buttons">

            <button type="submit" class="save">

                <i class="fas fa-save"></i>

                Save Employee

            </button>

            <button type="reset" class="reset">

                <i class="fas fa-rotate"></i>

                Reset

            </button>

        </div>

    </form>

</div>

</body>

</html>
