<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Edit Bonus & Deduction</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='css/edit_bonus.css') }}">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<div class="container">

<div class="header">

<h1>

<i class="fas fa-pen"></i>

Edit Bonus & Deduction

</h1>

<a href="/bonus_deduction" class="back-btn">

<i class="fas fa-arrow-left"></i>

Back

</a>

</div>

<div class="card">

<h2>

<i class="fas fa-user-edit"></i>

Update Employee Bonus & Deduction

</h2>

<form method="POST">

<div class="form-group">

<label>Employee Code</label>

<input
type="text"
value="{{ record.employee_code }}"
readonly>

</div>

<div class="form-group">

<label>Employee Name</label>

<input
type="text"
value="{{ record.name }}"
readonly>

</div>

<div class="form-group">

<label>Bonus Amount (₹)</label>

<input
type="number"
name="bonus"
value="{{ record.bonus }}"
required>

</div>

<div class="form-group">

<label>Deduction Amount (₹)</label>

<input
type="number"
name="deduction"
value="{{ record.deduction }}"
required>

</div>

<div class="form-group full">

<label>Remarks</label>

<textarea
name="remarks"
rows="4"
required>{{ record.remarks }}</textarea>

</div>

<div class="full">

<button type="submit">

<i class="fas fa-save"></i>

Update Record

</button>

</div>

</form>

</div>

</div>

</body>

</html>
