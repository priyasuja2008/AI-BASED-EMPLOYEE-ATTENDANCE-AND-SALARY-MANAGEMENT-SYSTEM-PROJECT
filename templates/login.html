<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Attendance System</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

<div class="container">

    <div class="left">

        <h1>AI Attendance System</h1>

        <h3>Employee Attendance Management</h3>

        <p>
            Secure Login Portal
        </p>

    </div>


    <div class="right">

        <form method="POST">

            <h2>Admin Login</h2>

            {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="error">
                    {{ messages[0] }}
                </div>
            {% endif %}
            {% endwith %}

            <div class="input-box">

                <i class="fa fa-user"></i>

                <input
                type="text"
                name="username"
                placeholder="Username"
                required>

            </div>


            <div class="input-box">

                <i class="fa fa-lock"></i>

                <input
                id="password"
                type="password"
                name="password"
                placeholder="Password"
                required>

                <i class="fa fa-eye"
                id="eye"
                onclick="showPassword()"></i>

            </div>


            <button type="submit">

                Login

            </button>
            <p style="margin-top: 25px;">
    Don't have an account?
    <a href="{{ url_for('signup') }}" style="color: #8B0000; font-weight: bold; text-decoration: none;">Create Account</a>
</p>

        </form>

    </div>

</div>


<script>

function showPassword(){

let x=document.getElementById("password");

if(x.type==="password"){

x.type="text";

}else{

x.type="password";

}

}

</script>

</body>
</html>
