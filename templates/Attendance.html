<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Attendance Management</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/attendance.css') }}">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<div class="container">

    <!-- Header -->

    <div class="header">

        <h1><i class="fas fa-calendar-check"></i> Attendance Management</h1>

        <a href="/dashboard" class="back-btn">
            <i class="fas fa-arrow-left"></i> Dashboard
        </a>

    </div>

    <!-- Date & Time -->

    <div class="top-info">

        <div class="info-box">

            <i class="fas fa-calendar"></i>

            <span id="date"></span>

        </div>

        <div class="info-box">

            <i class="fas fa-clock"></i>

            <span id="clock"></span>

        </div>

    </div>

    <!-- Attendance Form -->

    <form method="POST">

        <div class="card">

            <h2><i class="fas fa-user-check"></i> Mark Attendance</h2>

            <div class="grid">

                <div class="input-box">

                    <label>Employee Name</label>
                    <select name="emp_id" required>
                        <option value="">Select Employee</option>

                        {% for employee in employees %}
                            <option value="{{ employee.emp_id }}">
                               {{ employee.employee_code }} - {{ employee.name }}
                            </option>
                         {% endfor %}

                    </select>

                </div>

                <div class="input-box">

    <label>Attendance Date</label>

    <input type="date"
           name="attendance_date"
           required>

</div>

                <div class="input-box">

                    <label>Department</label>

                    <select name="department_id">

                        <option>HR</option>
                        <option>IT</option>
                        <option>Finance</option>
                        <option>Marketing</option>
                        <option>Sales</option>
                        <option>Production</option>

                    </select>

                </div>

                <div class="input-box">

                    <label>Status</label>

                    <select name="status">

                        <option>Present</option>
                        <option>Absent</option>

                    </select>

                </div>

                <div class="input-box">

                    <label>Check In</label>

                    <input type="time"
                           name="check_in">

                </div>

                <div class="input-box">

                    <label>Check Out</label>

                    <input type="time"
                           name="check_out">

                </div>

                <div class="input-box full">

                    <label>Remarks</label>

                    <textarea name="remarks"
                              rows="3"
                              placeholder="Enter remarks..."></textarea>

                </div>

            </div>

        </div>

        <!-- Buttons -->

        <div class="buttons">

            <button class="save" type="submit">

                <i class="fas fa-save"></i>

                Save Attendance

            </button>

            <button class="reset" type="reset">

                <i class="fas fa-rotate"></i>

                Reset

            </button>

        </div>

    </form>

<script>

function updateClock(){

let now=new Date();

document.getElementById("clock").innerHTML=now.toLocaleTimeString();

document.getElementById("date").innerHTML=now.toLocaleDateString();

}

setInterval(updateClock,1000);

updateClock();

</script>

</body>

</html>
